<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Pixel Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>

    /* style dla okienka gry */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #c8b89a;
      letter-spacing: 3px;
    }


    #game {
      width: min(960px, 90vw);
      height: min(480px, 45vw);
      border: 2px solid #3a3a5c;
    }

    #game canvas {
      display: block;
    }
  </style>
</head>
<body>

  <h1>Gra w Phaser.js</h1>
  <div id="game"></div>

  <script src="src/lib/phaser.js"></script>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
